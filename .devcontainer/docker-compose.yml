version: '3.8'

services:
  slwoggy-dev:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - /var/run/docker.sock:/var/run/docker-host.sock
    command: sleep infinity
    environment:
      - CMAKE_BUILD_TYPE=Debug
      - CXX=g++
      - CC=gcc
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    ports:
      - "8080:8080"
      - "3000:3000"
      - "5000:5000"
    working_dir: /workspace
    user: vscode
    hostname: slwoggy-dev
    
